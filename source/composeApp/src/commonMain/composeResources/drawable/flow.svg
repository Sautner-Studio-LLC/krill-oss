<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760">
    <defs>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M0,0 L12,6 L0,12 Z" fill="#2b2b2b"/>
        </marker>

        <style>
            .title { font: 700 26px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#111; }
            .sub   { font: 500 14px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#333; }
            .lbl   { font: 600 14px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#111; }
            .txt   { font: 500 13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#222; }
            .small { font: 500 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#333; }

            .box { fill:#ffffff; stroke:#2b2b2b; stroke-width:2; rx:14; }
            .soft { fill:#f7f7f7; stroke:#2b2b2b; stroke-width:2; rx:14; }
            .krill { fill:#e8f3ff; stroke:#2b2b2b; stroke-width:2; rx:14; }

            .pipe { stroke:#2b2b2b; stroke-width:3; fill:none; marker-end:url(#arrow); }
            .signal { stroke:#2b2b2b; stroke-width:2; stroke-dasharray:6 6; fill:none; marker-end:url(#arrow); }

            .note { fill:#fff7e6; stroke:#2b2b2b; stroke-width:2; rx:12; }
            .legendLine { stroke:#2b2b2b; stroke-width:3; fill:none; marker-end:url(#arrow); }
            .legendSig { stroke:#2b2b2b; stroke-width:2; stroke-dasharray:6 6; fill:none; marker-end:url(#arrow); }
        </style>
    </defs>

    <!-- Header -->
    <text x="40" y="55" class="title">Krill and the Movement of Water</text>
    <text x="40" y="80" class="sub">High-level system diagram: top-off, waterfall loop, safety sensors, and water-quality routing</text>

    <!-- KRILL SERVER -->
    <rect x="520" y="115" width="260" height="120" class="krill"/>
    <text x="650" y="150" text-anchor="middle" class="lbl">Krill Server</text>
    <text x="650" y="175" text-anchor="middle" class="txt">Rules + Telemetry</text>
    <text x="650" y="198" text-anchor="middle" class="small">Controls valves / pump • Triggers alarms</text>

    <!-- HOUSE WATER LINE -->
    <rect x="55" y="140" width="250" height="90" class="box"/>
    <text x="180" y="172" text-anchor="middle" class="lbl">House Water Line</text>
    <text x="180" y="196" text-anchor="middle" class="small">Supply (plumbed)</text>

    <!-- SOLENOID VALVE -->
    <rect x="335" y="140" width="160" height="90" class="soft"/>
    <text x="415" y="172" text-anchor="middle" class="lbl">Brass Valve</text>
    <text x="415" y="196" text-anchor="middle" class="small">NC Solenoid</text>

    <!-- AQUARIUM -->
    <rect x="840" y="120" width="410" height="160" class="box"/>
    <text x="1045" y="152" text-anchor="middle" class="lbl">300 gal Freshwater Planted Aquarium</text>
    <text x="1045" y="176" text-anchor="middle" class="small">Top-off line + float valve safety</text>

    <!-- Float Valve -->
    <rect x="1110" y="200" width="120" height="55" class="note"/>
    <text x="1170" y="232" text-anchor="middle" class="txt">Float Valve</text>
    <text x="1170" y="250" text-anchor="middle" class="small">failsafe</text>

    <!-- Water Level Sensor -->
    <rect x="860" y="210" width="170" height="55" class="soft"/>
    <text x="945" y="243" text-anchor="middle" class="txt">Water Level Sensor</text>

    <!-- Aquaponics -->
    <rect x="840" y="320" width="410" height="120" class="box"/>
    <text x="1045" y="354" text-anchor="middle" class="lbl">Aquaponics System</text>
    <text x="1045" y="378" text-anchor="middle" class="small">Receives water when EC is high</text>

    <!-- EC Sensor -->
    <rect x="860" y="390" width="170" height="55" class="soft"/>
    <text x="945" y="422" text-anchor="middle" class="txt">Atlas EC Sensor</text>

    <!-- Vivarium Water Feature -->
    <rect x="55" y="360" width="540" height="320" class="box"/>
    <text x="325" y="395" text-anchor="middle" class="lbl">Vivarium Water Feature Loop</text>
    <text x="325" y="418" text-anchor="middle" class="small">Reservoir → Pump → Waterfall/Pool → Gravity Return</text>

    <!-- Reservoir -->
    <rect x="95" y="455" width="200" height="90" class="soft"/>
    <text x="195" y="487" text-anchor="middle" class="lbl">Reservoir</text>
    <text x="195" y="510" text-anchor="middle" class="small">Under vivarium</text>

    <!-- Pump -->
    <rect x="320" y="455" width="210" height="90" class="soft"/>
    <text x="425" y="487" text-anchor="middle" class="lbl">Submerged Pump</text>
    <text x="425" y="510" text-anchor="middle" class="small">Pumps up &amp; over top</text>

    <!-- Waterfall + Pool -->
    <rect x="95" y="565" width="435" height="90" class="soft"/>
    <text x="312" y="597" text-anchor="middle" class="lbl">Waterfall → Pool</text>
    <text x="312" y="620" text-anchor="middle" class="small">Pool used for tortoise soaks/drinking</text>

    <!-- Leak Sensors -->
    <rect x="560" y="490" width="20" height="20" fill="#2b2b2b"/>
    <rect x="560" y="525" width="20" height="20" fill="#2b2b2b"/>
    <rect x="560" y="560" width="20" height="20" fill="#2b2b2b"/>
    <text x="585" y="505" class="small">Water sensors nearby</text>
    <text x="585" y="525" class="small">(leak/overflow)</text>

    <!-- Shutoff/Alarm Note -->
    <rect x="365" y="610" width="210" height="55" class="note"/>
    <text x="470" y="643" text-anchor="middle" class="txt">Alarm + Shutoff</text>

    <!-- Plumbing / Flow Lines -->
    <!-- House line to solenoid -->
    <path class="pipe" d="M305 185 L335 185"/>
    <!-- Solenoid to aquarium -->
    <path class="pipe" d="M495 185 L840 185"/>

    <!-- Vivarium loop: reservoir -> pump -> waterfall/pool -> gravity return -> reservoir -->
    <path class="pipe" d="M295 500 L320 500"/>
    <path class="pipe" d="M425 545 L425 565"/>
    <path class="pipe" d="M160 565 L160 545"/>
    <path class="pipe" d="M160 545 L95 545"/>
    <!-- Return line (gravity) from pool back to reservoir -->
    <path class="pipe" d="M130 655 L130 545"/>

    <!-- Optional top-off to reservoir (from house line via controlled path) -->
    <path class="pipe" d="M180 230 L180 455"/>
    <text x="190" y="345" class="small">Top-off feed</text>

    <!-- EC-triggered routing to aquaponics -->
    <path class="pipe" d="M1045 280 L1045 320"/>

    <!-- Signal / control lines -->
    <!-- Krill controls solenoid -->
    <path class="signal" d="M520 175 L495 175"/>
    <text x="510" y="165" text-anchor="end" class="small">control</text>

    <!-- Krill reads aquarium water level sensor -->
    <path class="signal" d="M860 237 L780 237 L780 205 L520 205"/>
    <text x="770" y="193" class="small">telemetry</text>

    <!-- Krill receives EC sensor telemetry -->
    <path class="signal" d="M860 417 L780 417 L780 235 L780 235 L780 235 L780 235 L780 235 L780 235 L780 235 L780 235 L780 235 L780 235 L780 235"/>
    <path class="signal" d="M780 417 L780 235 L780 235 L780 235 L780 235 L780 235"/>
    <path class="signal" d="M780 417 L780 235 L780 235 L520 235"/>
    <text x="770" y="404" class="small">telemetry</text>

    <!-- Krill triggers routing / action (conceptual) -->
    <path class="signal" d="M780 190 L820 190 L820 340 L840 340"/>
    <text x="820" y="328" class="small">rule action</text>

    <!-- Leak sensors to Krill -->
    <path class="signal" d="M580 510 L650 510 L650 235"/>
    <text x="595" y="480" class="small">telemetry</text>

    <!-- Krill triggers alarm/shutoff -->
    <path class="signal" d="M780 175 L820 175 L820 635 L575 635"/>
    <text x="815" y="625" text-anchor="end" class="small">alarm/shutoff</text>

    <!-- Legend -->
    <rect x="915" y="495" width="335" height="170" class="box"/>
    <text x="935" y="525" class="lbl">Legend</text>

    <path class="legendLine" d="M940 555 L1015 555"/>
    <text x="1030" y="560" class="small">Water / plumbing flow</text>

    <path class="legendSig" d="M940 585 L1015 585"/>
    <text x="1030" y="590" class="small">Telemetry / control signal</text>

    <rect x="940" y="607" width="18" height="18" fill="#2b2b2b"/>
    <text x="1030" y="622" class="small">Water sensor (leak/overflow)</text>

    <rect x="940" y="635" width="90" height="26" class="note"/>
    <text x="1040" y="653" class="small">Safety function</text>
</svg>
