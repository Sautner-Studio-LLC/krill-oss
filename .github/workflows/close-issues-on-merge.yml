name: Close issues on PR merge

on:
  pull_request:
    types: [closed]
    branches:
      - agents
      - main

permissions:
  issues: write
  pull-requests: read

jobs:
  close-referenced-issues:
    name: Close issues referenced in merged PR
    runs-on: ubuntu-latest

    steps:
      - name: Confirm merge and close referenced issues
        uses: actions/github-script@v7
        with:
          script: |
            // `pull_request: types: [closed]` can be delivered with `merged: false`
            // still in the payload when the merge itself is async (e.g.
            // `gh pr merge --auto --squash`) — GitHub queues the squash-merge and
            // fires the closed webhook before it commits, not after. Observed 68s
            // of lag between the `closed` event and the PR's actual `mergedAt`
            // (krill-oss#198). Re-fetch the PR a few times before concluding it
            // was closed without merging, instead of trusting the webhook snapshot.
            let pr = context.payload.pull_request;
            for (let attempt = 0; !pr.merged && attempt < 6; attempt++) {
              core.info(`PR #${pr.number} reports merged=false (check ${attempt + 1}/6) — waiting 15s and re-fetching…`);
              await new Promise(resolve => setTimeout(resolve, 15000));
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });
              pr = data;
            }
            if (!pr.merged) {
              core.info('PR closed without merging — nothing to close.');
              return;
            }

            const body = pr.body || '';
            // Match: close/closes/closed/fix/fixes/fixed/resolve/resolves/resolved + #N
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = new Set(
              [...body.matchAll(pattern)].map(m => parseInt(m[1], 10))
            );
            if (issueNumbers.size === 0) {
              core.info('No closing keywords found in PR body — nothing to close.');
              return;
            }
            for (const n of issueNumbers) {
              core.info(`Closing #${n} …`);
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: n,
                state: 'closed',
                state_reason: 'completed',
              });
            }
            core.info(`Done. Closed: ${[...issueNumbers].map(n => '#' + n).join(', ')}`);
