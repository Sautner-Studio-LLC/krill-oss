name: build

# Validates pull requests by building each Gradle root affected by the
# change. Three independent jobs (sdk / mcp / pi4j) so each surfaces as
# its own check for branch protection. Path filters skip a job when its
# tree didn't change — a docs-only PR runs no build work.

on:
  pull_request:
  push:
    branches: [main, agents]
  # Lets you re-run the matrix from the Actions tab without a code change.
  workflow_dispatch:

# Cancel in-flight builds when the PR gets a new push — saves runner cycles.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  actions: write

jobs:
  changes:
    name: detect changes
    runs-on: [ubuntu-latest]
    outputs:
      sdk: ${{ steps.filter.outputs.sdk }}
      mcp: ${{ steps.filter.outputs.mcp }}
      pi4j: ${{ steps.filter.outputs.pi4j }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          # Each module's filter also matches its own workflow file, so
          # editing the workflow re-runs the relevant build paths.
          filters: |
            sdk:
              - 'krill-sdk/**'
              - '.github/workflows/build.yml'
            mcp:
              - 'krill-mcp/**'
              - '.github/workflows/build.yml'
            pi4j:
              - 'pi4j-ktx-service/**'
              - '.github/workflows/build.yml'

  krill-sdk:
    name: krill-sdk · check
    needs: changes
    if: ${{ needs.changes.outputs.sdk == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: krill-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Highest toolchain in the repo is JDK 25 (pi4j-service). The SDK
          # itself is JDK 21, but a single launcher JDK across all jobs
          # keeps Gradle's toolchain auto-provisioning consistent.
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew check --no-daemon --stacktrace

  krill-mcp:
    name: krill-mcp · build
    needs: changes
    if: ${{ needs.changes.outputs.mcp == 'true' }}
    runs-on: [ubuntu-latest]
    defaults:
      run:
        working-directory: krill-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      # `:krill-mcp-service:build` depends on `shadowJar` and runs `test`,
      # which is the same gate the local dev loop uses.
      - run: ./gradlew :krill-mcp-service:build --no-daemon --stacktrace

  krill-pi4j:
    name: krill-pi4j · build
    needs: changes
    if: ${{ needs.changes.outputs.pi4j == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pi4j-ktx-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      # Builds both `:krill-pi4j` (JDK 21 client lib) and
      # `:krill-pi4j-service` (JDK 25 daemon). Foojay auto-provisions the
      # client toolchain off the JDK 25 launcher.
      - run: ./gradlew build --no-daemon --stacktrace

  # ── Release-train CI gate ──────────────────────────────────────────────
  # Two contexts are marked *required* on the `agents` branch protection:
  # `lessons-check` and `required-checks-passed`. The aggregator tolerates
  # *skipped* path-filtered builds (a docs-only PR runs none) but fails on a
  # real failure — never mark an individual conditional build job as required.
  lessons-check:
    name: lessons-check
    # Exempt the permanent integration PR (agents->main): it is an aggregate of
    # already-lessoned PRs, not a unit of work. The required-checks-passed
    # aggregator tolerates this skip, so the integration PR still gets the build
    # gate without a spurious lessons failure.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref != 'agents'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Require a lessons entry or explicit waiver
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"
          if echo "$changed" | grep -qE '^docs/lessons/.+\.md$'; then
            echo "lessons entry present"; exit 0
          fi
          if printf '%s' "$PR_BODY" | grep -qiF 'no-lesson-needed'; then
            echo "explicit no-lesson-needed waiver in PR body"; exit 0
          fi
          echo "::error::PR must add a docs/lessons/YYYY-MM-DD-<slug>.md entry, or include 'no-lesson-needed' with justification in the PR body."
          exit 1

  required-checks-passed:
    name: required-checks-passed
    if: always() && github.event_name == 'pull_request'
    needs: [changes, krill-sdk, krill-mcp, krill-pi4j, lessons-check]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any needed job failed or was cancelled
        run: |
          set -euo pipefail
          results='${{ toJSON(needs) }}'
          echo "$results"
          bad="$(echo "$results" | python3 -c "import json,sys; d=json.load(sys.stdin); print('\n'.join(k for k,v in d.items() if v['result'] in ('failure','cancelled')))")"
          if [ -n "$bad" ]; then echo "::error::failing/cancelled jobs: $bad"; exit 1; fi
          echo "all required checks passed (skipped jobs allowed)"
