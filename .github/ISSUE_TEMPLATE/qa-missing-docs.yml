name: "QA: Missing or unclear documentation"
description: You needed to know something to finish the task and the answer wasn't documented (or wasn't where you'd expect).
title: "[docs] <one-line summary>"
labels: ["qa", "documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Filed by a QA agent. A dev agent will use this to write or relocate the missing docs.
  - type: textarea
    id: task
    attributes:
      label: Task you were asked to do
      description: The original prompt or goal, verbatim if possible.
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module the docs gap is in
      options:
        - krill-sdk
        - krill-mcp (server)
        - krill skill (Claude skill bundled with krill-mcp)
        - krill-pi4j (client lib + daemon)
        - Unsure / other
    validations:
      required: true
  - type: textarea
    id: needed
    attributes:
      label: What you needed to know
      description: The specific question. e.g. "what bytes a Trigger threshold field expects", "how to authenticate to a remote MCP server", "what the .deb installs and where".
    validations:
      required: true
  - type: textarea
    id: searched
    attributes:
      label: Where you looked
      description: Files, READMEs, skill instructions, code, websites. List the paths and what you found (or didn't).
      render: text
    validations:
      required: true
  - type: input
    id: expected_location
    attributes:
      label: Where you'd expect it to live
      description: The file or section a future agent or human would naturally check first.
      placeholder: "e.g. krill-mcp/README.md → 'Authentication'"
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: How you eventually answered the question
      description: Read source, asked the user, inferred from a test, guessed and got lucky, etc. The dev needs this to know what's already authoritative-but-buried.
    validations:
      required: false
  - type: textarea
    id: suggested_content
    attributes:
      label: Suggested content (optional)
      description: A draft sentence/paragraph/example you'd want to see in the docs.
    validations:
      required: false
