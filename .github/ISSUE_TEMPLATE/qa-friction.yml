name: "QA: Friction"
description: Something was harder than it should have been. Use this when the task succeeded but cost more effort, retries, or guesswork than it should have.
title: "[friction] <one-line summary>"
labels: ["qa", "friction", "dx"]
body:
  - type: markdown
    attributes:
      value: |
        Filed by a QA agent. Capture enough that a dev agent can reproduce the friction and decide where to invest.
  - type: textarea
    id: task
    attributes:
      label: Task you were asked to do
      description: The original prompt or goal, verbatim if possible.
      placeholder: "e.g. 'Read the last hour of temperature DataPoints from node X on swarm Y.'"
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Suspected module
      description: Which component owns the friction. Pick "Unsure" if you don't know.
      options:
        - krill-sdk
        - krill-mcp (server)
        - krill skill (Claude skill bundled with krill-mcp)
        - krill-pi4j (client lib + daemon)
        - Unsure / other
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: What was painful
      description: The specific moment(s) where progress stalled, you had to guess, or you went down a wrong path.
    validations:
      required: true
  - type: textarea
    id: attempts
    attributes:
      label: What you tried
      description: Tool calls, commands, searches, files read, in order. Include any that didn't work.
      render: text
    validations:
      required: true
  - type: textarea
    id: resolution
    attributes:
      label: How you eventually got past it
      description: The step that worked, plus how you discovered it (asked the user, guessed, found buried in a file, etc.).
    validations:
      required: false
  - type: textarea
    id: improvement
    attributes:
      label: What would have made this easy
      description: Concrete suggestion — a docs change, a tool, a clearer error, a renamed field. Be specific.
    validations:
      required: true
  - type: input
    id: cost
    attributes:
      label: Approximate cost
      description: Rough number of attempts/tool calls/minutes burned, so the dev can prioritize.
      placeholder: "e.g. ~15 tool calls, 3 wrong turns"
    validations:
      required: false
