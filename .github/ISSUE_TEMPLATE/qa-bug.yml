name: "QA: Bug"
description: Something is broken — wrong output, error, crash, or behavior that contradicts docs.
title: "[bug] <one-line summary>"
labels: ["qa", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Filed by a QA agent. A dev agent will need to reproduce this. Be exact: real tool names, real arguments, real output.
  - type: textarea
    id: task
    attributes:
      label: Task you were asked to do
      description: The original prompt or goal, verbatim if possible.
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Suspected module
      options:
        - krill-sdk
        - krill-mcp (server)
        - krill skill (Claude skill bundled with krill-mcp)
        - krill-pi4j (client lib + daemon)
        - Unsure / other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead. Include the exact error message or wrong value.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact tool calls / CLI commands / API requests in order, with arguments. A dev agent should be able to copy-paste these.
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / logs / stack trace
      render: text
    validations:
      required: false
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Module/SDK version, krill-mcp server version, swarm/server version if known.
      placeholder: "e.g. krill-sdk 0.0.16, krill-mcp 0.3.2, server 2026.04.01"
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Host (Claude Desktop / Claude Code / API), OS, MCP transport (HTTP/stdio), anything else relevant.
    validations:
      required: false
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis (optional)
      description: If you have a guess about the cause, file or function involved, put it here.
    validations:
      required: false
